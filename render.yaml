services:
  - type: web
    name: site-bazma
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_DEBUG
        value: "0"
      - key: APP_SECRET
        generateValue: true
      - key: DEFAULT_URI
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: RUN_MIGRATIONS
        value: "0"
