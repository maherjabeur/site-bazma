services:
  - type: web
    name: site-bazma
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_DEBUG
        value: "0"
      - key: PHP_VERSION
        value: "8.3.0"
      - key: COMPOSER_PLATFORM_PHP
        value: "8.3.0"
      - key: APP_SECRET
        generateValue: true
      - key: DEFAULT_URI
        sync: false
      - key: PORT
        value: "10000"
      - key: DB_DRIVER
        value: mysql
      - key: DB_HOST
        value: sql7.freesqldatabase.com
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: sql7830570
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SERVER_VERSION
        value: "8.0.0"
      - key: RUN_MIGRATIONS
        value: "1"
