services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:10000"
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: local-docker-test-secret-change-me
      DEFAULT_URI: http://localhost:8000
      PORT: "10000"
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: bazma
      DB_USER: bazma
      DB_PASSWORD: bazma_password
      DB_SERVER_VERSION: 8.4.7
      RUN_MIGRATIONS: "1"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/var/www/html/public/uploads

  db:
    build:
      context: ./docker/mysql
      dockerfile: Dockerfile
    environment:
      MYSQL_DATABASE: bazma
      MYSQL_USER: bazma
      MYSQL_PASSWORD: bazma_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot_password --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  mysql-data:
  uploads:
